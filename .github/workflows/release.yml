name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Create zip
        run: cd dist && zip -r Peep.zip Peep.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Peep.zip
          generate_release_notes: true
